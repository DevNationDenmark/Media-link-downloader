<!DOCTYPE html>
<html>
<head>
  <title>YouTube Downloader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="header">
        <h1>YT Downloader</h1>
        <p>Download videoer eller lyd hurtigt og simpelt</p>
      </div>

      <div class="input-group">
        <input type="text" id="url" placeholder="Indsæt YouTube link...">
      </div>

      <div class="controls">
        <select id="format">
          <option value="mp4">🎬 Video (MP4)</option>
          <option value="mp3">🎵 Audio (MP3)</option>
        </select>

        <button onclick="download()">Download</button>
      </div>

      <div id="status"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
